<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F5F0E8">
  <meta name="apple-mobile-web-app-title" content="UAB's Trip">
  <title>UAB's Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="cover">
    <div class="cover__bg" aria-hidden="true"></div>

    <div class="cover__frame">
      <div class="cover__inner">
        <div id="cover-watermarks" class="cover__watermarks" aria-hidden="true"></div>

        <p class="cover__tag cover__tag--left">From Sally</p>

        <p class="cover__eyebrow cover__reveal">Anniversary · 一周年</p>

        <h1 class="cover__title cover__reveal">
          <span class="cover__title-line">UAB's TRiP</span>
        </h1>

        <p class="cover__meta cover__reveal cover__reveal--late">Europe · China · 2024 — 2025</p>

        <div class="cover__cta-group cover__reveal cover__reveal--late">
          <button class="cover__cta cover__cta--map" type="button" data-scroll-to="map-section">探索地图</button>
          <button class="cover__cta cover__cta--gallery" type="button" data-scroll-to="gallery-section">浏览照片</button>
        </div>

        <p class="cover__tag cover__tag--right">To Dori &amp; Flora</p>
      </div>
    </div>

    <footer class="cover__footer">
      <span class="cover__film-holes" aria-hidden="true"></span>
      <span class="cover__stamp">TRAVEL MEMOIR</span>
      <span class="cover__film-holes" aria-hidden="true"></span>
    </footer>
  </main>

  <section class="map-section" id="map-section" aria-label="旅行路线地图">
    <header class="map-section__header">
      <p class="map-section__eyebrow">Our Route</p>
      <h2 class="map-section__title">Twelve Stops</h2>
      <p class="map-section__desc">从格拉斯哥出发，一路向东，穿越欧亚大陆</p>
    </header>

    <div class="map-section__frame">
      <div id="world-map" class="map-section__map is-loading" aria-busy="true"></div>
    </div>
  </section>

  <section class="gallery-section" id="gallery-section" aria-label="旅行照片墙">
    <header class="gallery-section__header">
      <h2 class="gallery-section__title">Our Memories</h2>
      <p class="gallery-section__desc">每一张都是故事</p>
    </header>
    <div id="photo-wall" class="photo-wall"></div>
  </section>

  <footer class="site-footer">
    <p class="site-footer__text">2024–2025 · UAB's Story</p>
  </footer>

  <aside id="detail-panel" class="detail-panel" aria-hidden="true" aria-labelledby="detail-panel-title">
    <button class="detail-panel__close" type="button" aria-label="关闭详情面板">&times;</button>
    <div class="detail-panel__scroll">
      <header class="detail-panel__header">
        <h2 id="detail-panel-title" class="detail-panel__title-en"></h2>
        <p class="detail-panel__title-zh"></p>
        <p class="detail-panel__desc"></p>
      </header>
      <div class="detail-panel__video" hidden></div>
      <div class="detail-panel__photos"></div>
    </div>
  </aside>

  <audio id="bgm" class="bgm" preload="auto"></audio>

  <div id="music-player" class="music-player is-paused" role="group" aria-label="背景音乐播放器">
    <button id="music-prev" class="music-player__btn" type="button" aria-label="上一首">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M14 6l-6 6 6 6V6z"/></svg>
    </button>
    <button id="music-play" class="music-player__btn music-player__btn--play" type="button" aria-label="播放" aria-pressed="false">
      <svg class="music-player__icon music-player__icon--play" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
      <svg class="music-player__icon music-player__icon--pause" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
    </button>
    <button id="music-next" class="music-player__btn" type="button" aria-label="下一首">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M10 6v12l6-6-6-6z"/></svg>
    </button>
    <span id="music-title" class="music-player__title"></span>
  </div>

  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="照片预览">
    <button class="lightbox__close" type="button" aria-label="关闭预览">&times;</button>
    <button class="lightbox__nav lightbox__nav--prev" type="button" aria-label="上一张">&lsaquo;</button>
    <button class="lightbox__nav lightbox__nav--next" type="button" aria-label="下一张">&rsaquo;</button>
    <figure class="lightbox__figure">
      <img class="lightbox__img" src="" alt="">
      <figcaption class="lightbox__counter"></figcaption>
    </figure>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="data.js?v=2"></script>
  <script src="script.js?v=11"></script>
</body>
</html>
